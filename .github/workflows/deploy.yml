name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22 # Stable long-term support
          cache: 'npm'

      - name: Install dependencies
        # Use install instead of ci for one run to rebuild the lockfile if needed
        run: npm install 

      - name: Build
        # We point directly to the binary to avoid "command not found" errors
        run: ./node_modules/.bin/vite build --base /gpu-paint/

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4